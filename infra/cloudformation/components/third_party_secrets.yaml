AWSTemplateFormatVersion: 2010-09-09
Description: "Creates in AWS Secrets Manager a secret for a third party service"
Parameters:
  EnvId:
    Type: String
    Description: Environment Id (used to namespace resources)
    AllowedPattern: "^[a-z][a-z0-9-]{2,49}$"
    ConstraintDescription: Must be lower case letters, digits, or hyphens (3-50 characters).

Resources:
  MongoDBSecret:
    Type: "AWS::SecretsManager::Secret"
    Properties:
      Name: !Sub "/${EnvId}/mongodb"
      GenerateSecretString:
        SecretStringTemplate: '{"mongo_uri": "placeholder"}'
        GenerateStringKey: "password"
        PasswordLength: 30
        ExcludePunctuation: true
      Tags:
        - Key: EnvId
          Value: !Ref EnvId


  JWTSecret:
    Type: "AWS::SecretsManager::Secret"
    Properties:
      Name: !Sub "/${EnvId}/jwt"
      GenerateSecretString:
        SecretStringTemplate: '{"jwt_secret": "placeholder"}'
        GenerateStringKey: "password"
        PasswordLength: 30
        ExcludePunctuation: true
      Tags:
        - Key: EnvId
          Value: !Ref EnvId


  SwychrSecret:
    Type: "AWS::SecretsManager::Secret"
    Properties:
      Name: !Sub "/${EnvId}/swychr"
      GenerateSecretString:
        SecretStringTemplate: '{"email": "placeholder"}'
        GenerateStringKey: "password"
        PasswordLength: 30
        ExcludePunctuation: true
      Tags:
        - Key: EnvId
          Value: !Ref EnvId


Outputs:
  MongoDBSecretArn:
    Description: "Mongo DB Secret ARN"
    Value: !Ref MongoDBSecret

  JWTSecretArn:
    Description: "JWT Secret ARN"
    Value: !Ref JWTSecret

  SwychrSecretArn:
    Description: "Swychr Secret ARN"
    Value: !Ref SwychrSecret 